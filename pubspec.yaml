name: pagobus
description: "PagoBus - Control de pagos de transporte escolar"
publish_to: 'none'

# El numero de version se incrementa en cada release (ver .github/workflows/release.yml)
version: 1.0.6+7

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  table_calendar: ^3.1.3
  sqflite: ^2.4.1
  path: ^1.9.1
  shared_preferences: ^2.3.4
  http: ^1.2.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  fl_chart: ^0.69.2
  local_auth: ^2.3.0
  share_plus: ^10.1.3
  file_picker: ^8.1.6
  crypto: ^3.0.6
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/pagobus_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFC107"
  adaptive_icon_foreground: "assets/icon/pagobus_icon_fg.png"
